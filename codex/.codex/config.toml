model = "gpt-5.2-codex"
model_reasoning_effort = "medium"
personality = "pragmatic"


[notice]
hide_gpt5_1_migration_prompt = true
"hide_gpt-5.1-codex-max_migration_prompt" = true

[notice.model_migrations]
"gpt-5.1-codex-max" = "gpt-5.2-codex"

[plugins."github@openai-curated"]
enabled = true

[plugins."ponytail@ponytail"]
enabled = true

[mcp_servers.codebase-memory-mcp]
command = "npx"
args = ["-y", "codebase-memory-mcp"]

[[hooks.SessionStart]]
matcher = "startup|resume|clear|compact"

[[hooks.SessionStart.hooks]]
type = "command"
command = 'echo "Code discovery: prefer codebase-memory-mcp (search_graph, trace_path, get_code_snippet, query_graph, search_code) over grep/file-read; run index_repository first if the project is not indexed."'

[marketplaces.ponytail]
last_updated = "2026-06-24T08:09:22Z"
source_type = "git"
source = "https://github.com/DietrichGebert/ponytail.git"

[projects."/home/recreation/Documents/01-Projects/MIPS/work_assignments"]
trust_level = "trusted"

[projects."/home/recreation/dotfiles"]
trust_level = "trusted"

[projects."/home/recreation/Documents/01-Projects/MIPS/ry-psiam"]
trust_level = "trusted"

[projects."/home/recreation/Documents/01-Projects/MIPS/ry-merged"]
trust_level = "trusted"

[projects."/home/recreation/Documents/01-Projects/MIPS"]
